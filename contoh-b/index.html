<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index-B.css">
</head>
<body>
    <div class="intro-screen">
        <div class="bunting" id="bunting"></div>
        <h1>🎉 Happy Birthday Nxyaa</h1>
        <div class="cake">🎂</div>
        <button class="btn-start" onclick="start()">Mulai</button>
        <p class="press">press me :3</p>
    </div>

    <div class="main-content" id="maincontent">
        <section class="hero">
        <div class="hero-card">
        <div class="foto-placeholder">🎈</div>
        <div class="hero-text">
        <h2 class="nama">Nxyaa</h2>
        <p class="tanggal">📅 19 desember 2026</p>
        <div class="countdown">
            <div class="countdown-box">
                <span id="hari">00</span>
                <p>Hari</p>
            </div>
            <div class="countdown-box">
                <span id="jam">00</span>
                <p>Jam</p>
            </div>
            <div class="countdown-box">
                <span id="menit">00</span>
                <p>Menit</p>
            </div>
            <div class="countdown-box">
                <span id="detik">00</span>
                <p>Detik</p>
            </div>
            </div>
            <audio id="musikUltah" loop>
                <source src="audio/musik.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>
    </section>

    <section class="pesan">
    <div class="amplop" id="amplop" onclick="bukaAmplop()">
        <div class="amplop-tutup"></div>
        <div class="amplop-badan">
            <p>💌</p>
        </div>
    </div>
    
    <div class="isi-surat" id="isiSurat">
        <h3>🎉 Untuk Kamu!</h3>
        <p class="isi-pesan">semoga panjang umur dan sehat selalu</p>
    </div>
</section>

    <section class="penutup">
        <h3>🎉 Semoga harimu secerah warna-warni ini! 🎉</h3>
    </section>
    </div>

    <script src="index-B.js"></script>
</body>
</html>

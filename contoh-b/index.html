<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index-B.css">
</head>
<body>
    <div class="intro-screen">
        <div class="bunting" id="bunting"></div>
        <h1>🎉 Happy Birthday Kitty!</h1>
        <div class="cake">🎂</div>
        <button class="btn-start" onclick="start()">Mulai</button>
        <p class="press">press me :3</p>
    </div>

    <div class="main-content" id="maincontent">
        <section class="hero">
        <div class="hero-card">
        <div class="foto-placeholder">
            <img src="img/foto.png" alt="Foto">
            <div class="topi">
                <img src="img/party-hat.png" alt="Topi ulang tahun">
            </div>
        </div>
        <div class="hero-text">
        <h2 class="nama">Nama Orang</h2>
        <p class="tanggal">📅 17 Agustus 2045</p>
        <div class="countdown" id="countdown">
            <div class="countdown-box">
                <span id="hari">00</span>
                <p>Hari</p>
            </div>
            <div class="countdown-box">
                <span id="jam">00</span>
                <p>Jam</p>
            </div>
            <div class="countdown-box">
                <span id="menit">00</span>
                <p>Menit</p>
            </div>
            <div class="countdown-box">
                <span id="detik">00</span>
                <p>Detik</p>
            </div>
            </div>
            <div class="ucapan-wrap" id="ucapanHariH" style="display:none;">
                <span class="confetti-samping">🎉</span>
                <h2 class="ucapan-hariH">Selamat Ulang Tahun!</h2>
                <span class="confetti-samping">🎉</span>
            </div>
            <div id="ytAudioContainer" style="position:absolute; width:0; height:0; overflow:hidden;"></div>
        </div>
    </div>
    </section>

    <section class="pesan">
    <div class="amplop" id="amplop" onclick="bukaAmplop()">
        <div class="amplop-tutup"></div>
        <div class="amplop-badan">
            <p>💌</p>
        </div>
    </div>
    
    <div class="isi-surat" id="isiSurat">
        <h3>🎉 Untuk Kamu!</h3>
        <p class="isi-pesan">Semoga Sehat dan Gak ngerepotin babu</p>
    </div>
</section>

    <section class="penutup">
        <div class="penutup-wrap">
            <span class="confetti-samping">🎉</span>
            <div class="penutup-teks">
                <div class="baris-teks">Semoga harimu</div>
                <div class="baris-teks">secerah warna-warni ini!</div>
            </div>
            <span class="confetti-samping">🎉</span>
        </div>
    </section>
    </div>

    <script src="index-B.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
